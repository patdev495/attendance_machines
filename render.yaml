services:
  - type: web
    name: attendance-demo
    runtime: python
    repo: https://github.com/YOUR_USERNAME/Time_Attendance_Machine
    branch: deploy/demo
    buildCommand: pip install -r requirements_render.txt
    startCommand: python backend/src/main.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
    plan: free
