server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Phục vụ các file tĩnh (Frontend)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Cấu hình fallback cho Vue Router (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Proxy tất cả request có tiền tố /api/ sang Backend Container
    location /api/ {
        proxy_pass http://backend:8001/api/;
        
        # Cấu hình proxy để hỗ trợ HTTP/1.1 và WebSocket (cho Live Logs)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Chuyển tiếp các thông tin headers của Client
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
