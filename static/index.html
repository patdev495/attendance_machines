<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard | Premium Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #2dd4bf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text; /* Fixed compatibility */
            -webkit-text-fill-color: transparent;
        }

        .btn-sync {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-sync:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-sync:active {
            transform: scale(0.95);
        }

        .btn-sync.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .filters {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(51, 65, 85, 0.3);
            padding: 16px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge-ip {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading indicator */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: inline-block; }
        .loading span { display: none; }

        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 24px;
            border-top: 1px solid var(--border);
            animation: fadeInUp 0.8s ease-out 0.6s backwards;
        }

        .btn-page {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            min-width: 40px;
        }

        .btn-page:hover:not(:disabled) {
            border-color: var(--primary);
            color: white;
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-page.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-page:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 10px;
        }

        @media (max-width: 768px) {
            .filters { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-sync { width: 100%; justify-content: center; }
            .pagination { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Time Attendance</h1>
                <p style="color: var(--text-muted); margin-top: 4px;">Smart tracking system powered by FastAPI</p>
            </div>
            <button id="syncBtn" class="btn-sync" onclick="syncData()">
                <div class="spinner"></div>
                <span>Sync Machines</span>
            </button>
        </header>

        <div id="syncStatus" style="display: none; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-bottom: 24px; font-size: 0.9rem; color: var(--accent);">
            <span id="syncStatusText">Syncing in progress...</span>
        </div>

        <section class="filters">
            <div class="filter-group">
                <label>Employee ID</label>
                <input type="text" id="employeeId" placeholder="e.g. 101" oninput="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Machine IP</label>
                <select id="machineIp" onchange="loadData(1)">
                    <option value="">All Machines</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date From</label>
                <input type="date" id="startDate" onchange="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Date To</label>
                <input type="date" id="endDate" onchange="loadData(1)">
            </div>
        </section>

        <div class="table-container">
            <table id="logsTable">
                <thead>
                    <tr>
                        <th>Employee ID</th>
                        <th>Attendance Time</th>
                        <th>Machine IP</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <div id="loadingState" class="empty-state">Loading data...</div>
            <div id="noDataState" class="empty-state" style="display: none;">No records found matching filters.</div>
            
            <div class="pagination" id="paginationControls">
                <!-- Pagination buttons will be here -->
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 50;
        let isSyncing = false;

        async function fetchMachines() {
            try {
                const response = await fetch('/api/machines');
                const machines = await response.json();
                const select = document.getElementById('machineIp');
                machines.forEach(ip => {
                    const opt = document.createElement('option');
                    opt.value = ip;
                    opt.textContent = ip;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Failed to load machines:', err);
            }
        }

        async function loadData(page = 1) {
            currentPage = page;
            const employeeId = document.getElementById('employeeId').value;
            const machineIp = document.getElementById('machineIp').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            let url = `/api/attendance?page=${page}&size=${pageSize}&`;
            if (employeeId) url += `employee_id=${employeeId}&`;
            if (machineIp) url += `machine_ip=${machineIp}&`;
            if (startDate) url += `start_date=${startDate}&`;
            if (endDate) url += `end_date=${endDate}&`;

            const tableBody = document.getElementById('logsBody');
            const loadingState = document.getElementById('loadingState');
            const noDataState = document.getElementById('noDataState');
            const pgControls = document.getElementById('paginationControls');

            loadingState.style.display = 'block';
            noDataState.style.display = 'none';
            tableBody.innerHTML = '';
            pgControls.innerHTML = '';

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                loadingState.style.display = 'none';
                
                if (data.items.length === 0) {
                    noDataState.style.display = 'block';
                    return;
                }

                data.items.forEach(log => {
                    const row = document.createElement('tr');
                    const time = new Date(log.attendance_time).toLocaleString('vi-VN');
                    row.innerHTML = `
                        <td style="font-weight: 600; color: #fff;">${log.employee_id}</td>
                        <td>${time}</td>
                        <td><span class="badge-ip">${log.machine_ip}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                renderPagination(data.current_page, data.total_pages, data.total_count);
            } catch (err) {
                console.error('Failed to load logs:', err);
                loadingState.textContent = 'Error loading data from server.';
            }
        }

        function renderPagination(current, total, totalRecords) {
            const container = document.getElementById('paginationControls');
            if (total <= 1) return;

            // Info bar combined with numbers
            const createBtn = (p, text, active = false, disabled = false) => {
                const b = document.createElement('button');
                b.className = `btn-page ${active ? 'active' : ''}`;
                b.textContent = text || p;
                b.disabled = disabled;
                b.onclick = () => loadData(p);
                return b;
            };

            const prevBtn = createBtn(current - 1, 'Prev', false, current === 1);
            container.appendChild(prevBtn);

            // Logic for 1, 2, 3 ... Total
            if (total <= 5) {
                for (let i = 1; i <= total; i++) container.appendChild(createBtn(i, i, i === current));
            } else {
                // Always show first 3
                for (let i = 1; i <= 3; i++) container.appendChild(createBtn(i, i, i === current));
                
                if (current > 3 && current < total) {
                    // If current is beyond 3, show ellipsis and current? 
                    // Let's refine: 1, 2, 3 ... [Last]
                    const ellipsis = document.createElement('button');
                    ellipsis.className = 'btn-page';
                    ellipsis.textContent = '...';
                    ellipsis.onclick = () => {
                        const p = prompt(`Nhập số trang (1 - ${total}):`, current);
                        if (p && !isNaN(p)) {
                            const target = parseInt(p);
                            if (target >= 1 && target <= total) loadData(target);
                        }
                    };
                    container.appendChild(ellipsis);
                } else if (total > 4) {
                    const ellipsis = document.createElement('button');
                    ellipsis.className = 'btn-page';
                    ellipsis.textContent = '...';
                    ellipsis.onclick = () => {
                        const p = prompt(`Nhập số trang (1 - ${total}):`, current);
                        if (p && !isNaN(p)) {
                            const target = parseInt(p);
                            if (target >= 1 && target <= total) loadData(target);
                        }
                    };
                    container.appendChild(ellipsis);
                }

                // Always show last
                container.appendChild(createBtn(total, total, current === total));
            }

            const nextBtn = createBtn(current + 1, 'Next', false, current === total);
            container.appendChild(nextBtn);

            const info = document.createElement('span');
            info.className = 'page-info';
            info.style.marginLeft = '20px';
            info.textContent = `(${totalRecords} bản ghi)`;
            container.appendChild(info);
        }

        async function syncData() {
            const btn = document.getElementById('syncBtn');
            if (isSyncing) return;
            
            try {
                const response = await fetch('/api/sync', { method: 'POST' });
                const result = await response.json();
                checkSyncStatus();
            } catch (err) {
                alert('Sync trigger failed: ' + err.message);
            }
        }

        async function checkSyncStatus() {
            try {
                const response = await fetch('/api/sync-status');
                const status = await response.json();
                
                const statusDiv = document.getElementById('syncStatus');
                const statusText = document.getElementById('syncStatusText');
                const syncBtn = document.getElementById('syncBtn');

                if (status.is_running) {
                    isSyncing = true;
                    statusDiv.style.display = 'block';
                    syncBtn.classList.add('loading');
                    statusText.textContent = `Đang đồng bộ máy ${status.current_machine_index}/${status.total_machines}: ${status.current_machine_ip}... (Đã thêm ${status.total_added} bản ghi)`;
                    setTimeout(checkSyncStatus, 2000); // Poll every 2s
                } else {
                    if (isSyncing) {
                        // Just finished
                        alert(`Đồng bộ hoàn tất! Tổng cộng thêm ${status.total_added} bản ghi.`);
                        loadData(1);
                    }
                    isSyncing = false;
                    statusDiv.style.display = 'none';
                    syncBtn.classList.remove('loading');
                }
            } catch (err) {
                console.error('Status check failed:', err);
            }
        }

        // Initialize
        fetchMachines();
        loadData(1);
        checkSyncStatus(); // Poll status on load in case sync is already running
    </script>
</body>
</html>
