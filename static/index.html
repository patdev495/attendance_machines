<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard | Premium Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #2dd4bf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            /* Fixed compatibility */
            -webkit-text-fill-color: transparent;
        }

        .btn-sync {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-sync:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-sync:active {
            transform: scale(0.95);
        }

        .btn-sync.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .filters {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
        }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(51, 65, 85, 0.3);
            padding: 16px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge-ip {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading indicator */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading .spinner {
            display: inline-block;
        }

        .loading span {
            display: none;
        }

        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 24px;
            border-top: 1px solid var(--border);
            animation: fadeInUp 0.8s ease-out 0.6s backwards;
        }

        .btn-page {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            min-width: 40px;
        }

        .btn-page:hover:not(:disabled) {
            border-color: var(--primary);
            color: white;
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-page.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-page:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 10px;
        }

        /* View Toggle - Dark Mode Optimized */
        .view-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            width: fit-content;
            border: 1px solid var(--border);
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            color: var(--text-muted);
            background: transparent;
        }

        .toggle-btn:hover {
            color: #fff;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .filter-group-summary {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
            animation: fadeIn 0.5s ease-out;
        }

        .badge-hours {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .note-missing {
            color: #fbbf24;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge-shift {
            background: rgba(45, 212, 191, 0.15);
            color: #5eead4;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .badge-shift.night {
            background: rgba(167, 139, 250, 0.15);
            color: #c4b5fd;
        }
        .badge-status.tv {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn-delete {
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .btn-sync {
                width: 100%;
                justify-content: center;
            }

            .pagination {
                flex-wrap: wrap;
            }
        }
        /* Device Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--bg-card);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-modal {
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
        }
        .capacity-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .capacity-table th, .capacity-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        .capacity-table th { color: var(--text-muted); font-weight: 500; }
        .capacity-bar {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
        }
        .capacity-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
        }

    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Nienyi Employees Time Attendance</h1>
                <p style="color: var(--text-muted); margin-top: 4px;"></p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button id="excelSyncBtn" class="btn-sync" style="background: rgba(45, 212, 191, 0.1); border-color: #2dd4bf;" onclick="syncExcel()">
                    <span>Sync Excel</span>
                </button>
                <button id="deviceBtn" class="btn-sync" style="background: rgba(139, 92, 246, 0.1); border-color: #8b5cf6;" onclick="openDeviceModal()">
                    <span>Device Status</span>
                </button>
                <button id="syncBtn" class="btn-sync" onclick="syncData()">
                    <div class="spinner"></div>
                    <span>Sync Machines</span>
                </button>
            </div>
        </header>

        <div id="syncStatus"
            style="display: none; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-bottom: 12px; font-size: 0.9rem; color: var(--accent);">
            <span id="syncStatusText">Syncing in progress...</span>
        </div>

        <div id="deleteStatus"
            style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 12px 20px; border-radius: 12px; margin-bottom: 24px; font-size: 0.9rem; color: #f87171;">
            <span id="deleteStatusText">Deleting employee data...</span>
        </div>

        <div class="view-toggle">
            <button id="btnRaw" class="toggle-btn active" onclick="setView('raw')">Raw Logs</button>
            <button id="btnSummary" class="toggle-btn" onclick="setView('summary')">Daily Summary</button>
        </div>

        <section class="filters">
            <div class="filter-group">
                <label>Employee ID</label>
                <input type="text" id="employeeId" placeholder="e.g. 101" oninput="loadData(1)">
            </div>
            <div class="filter-group" id="machineFilterGroup">
                <label>Machine IP</label>
                <select id="machineIp" onchange="loadData(1)">
                    <option value="">All Machines</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date From</label>
                <input type="date" id="startDate" onchange="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Date To</label>
                <input type="date" id="endDate" onchange="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter" onchange="loadData(1)">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="TV">Resigned (TV)</option>
                </select>
            </div>
        </section>

        <section class="filter-group-summary" id="summaryFilters">
            <div class="filter-group">
                <label>Min Hours</label>
                <input type="number" id="minHours" placeholder="e.g. 8" oninput="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Max Hours</label>
                <input type="number" id="maxHours" placeholder="e.g. 12" oninput="loadData(1)">
            </div>
            <div class="filter-group">
                <label>Shift Filter</label>
                <select id="shiftFilter" onchange="loadData(1)">
                    <option value="">All Shifts</option>
                    <option value="N">Day Shift (N)</option>
                    <option value="D">Night Shift (D)</option>
                    <option value="NA">NA (Unknown)</option>
                </select>
            </div>
            <div class="filter-group" style="flex-direction: row; align-items: center; gap: 10px; padding-top: 32px;">
                <input type="checkbox" id="onlyMissing" onchange="loadData(1)"
                    style="width: 20px; height: 20px; cursor: pointer;">
                <label style="margin-bottom: 0; cursor: pointer;" for="onlyMissing">Only Missing Records</label>
            </div>
        </section>

        <div class="table-container">
            <table id="logsTable">
                <thead id="tableHead">
                    <tr>
                        <th>Employee ID</th>
                        <th>Attendance Time</th>
                        <th>Machine IP</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <div id="loadingState" class="empty-state">Loading data...</div>
            <div id="noDataState" class="empty-state" style="display: none;">No records found matching filters.</div>

            <div class="pagination" id="paginationControls">
                <!-- Pagination buttons will be here -->
            </div>
        </div>

        <!-- Device Status Modal -->
        <div id="deviceModal" class="modal">
            <div class="modal-content" style="max-width: 900px;">
                <div class="modal-header">
                    <h2>Machine Capacity & Status</h2>
                    <span class="close-modal" onclick="closeDeviceModal()">&times;</span>
                </div>
                <div id="deviceModalBody">
                    <p>Fetching real-time data from machines...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 50;
        let isSyncing = false;
        let currentView = 'raw';

        window.onload = async () => {
            // Set default date range to last 30 days for better performance
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setDate(today.getDate() - 30);
            
            const startDateEl = document.getElementById('startDate');
            const endDateEl = document.getElementById('endDate');
            if (startDateEl && endDateEl) {
                endDateEl.value = today.toISOString().split('T')[0];
                startDateEl.value = lastMonth.toISOString().split('T')[0];
            }

            await fetchMachines();
            await loadData(1);
        };

        async function fetchMachines() {
            try {
                const response = await fetch('/api/machines');
                const machines = await response.json();
                const select = document.getElementById('machineIp');
                machines.forEach(ip => {
                    const opt = document.createElement('option');
                    opt.value = ip;
                    opt.textContent = ip;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Failed to load machines:', err);
            }
        }

        function setView(view) {
            currentView = view;
            document.getElementById('btnRaw').classList.toggle('active', view === 'raw');
            document.getElementById('btnSummary').classList.toggle('active', view === 'summary');

            // Always show Machine IP filter as requested
            document.getElementById('machineFilterGroup').style.display = 'block';

            // Toggle summary-specific filters
            document.getElementById('summaryFilters').style.display = view === 'summary' ? 'grid' : 'none';

            updateTableHeaders();
            loadData(1);
        }

        function updateTableHeaders() {
            const head = document.getElementById('tableHead');
            if (currentView === 'raw') {
                head.innerHTML = `
                    <tr>
                        <th>Employee ID</th>
                        <th>Attendance Time</th>
                        <th>Machine IP</th>
                    </tr>
                `;
            } else {
                head.innerHTML = `
                    <tr>
                        <th>Employee ID</th>
                        <th>Date</th>
                        <th>Shift</th>
                        <th>First Tap</th>
                        <th>Last Tap</th>
                        <th>Hours</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                `;
            }
        }

        async function loadData(page = 1) {
            currentPage = page;
            const employeeId = document.getElementById('employeeId').value;
            const machineIp = document.getElementById('machineIp').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const statusFilter = document.getElementById('statusFilter').value;

            // Summary-specific filters
            const minHours = document.getElementById('minHours').value;
            const maxHours = document.getElementById('maxHours').value;
            const shiftFilter = document.getElementById('shiftFilter').value;
            const onlyMissing = document.getElementById('onlyMissing').checked;

            let endpoint = currentView === 'raw' ? '/api/attendance' : '/api/attendance/summary';
            let url = `${endpoint}?page=${page}&size=${pageSize}&`;

            if (employeeId) url += `employee_id=${employeeId}&`;
            if (machineIp) url += `machine_ip=${machineIp}&`;
            if (startDate) url += `start_date=${startDate}&`;
            if (endDate) url += `end_date=${endDate}&`;
            if (statusFilter) url += `status=${statusFilter}&`;

            if (currentView === 'summary') {
                if (minHours) url += `min_hours=${minHours}&`;
                if (maxHours) url += `max_hours=${maxHours}&`;
                if (shiftFilter) url += `shift=${shiftFilter}&`;
                if (onlyMissing) url += `only_missing=true&`;
            }

            const tableBody = document.getElementById('logsBody');
            const loadingState = document.getElementById('loadingState');
            const noDataState = document.getElementById('noDataState');
            const pgControls = document.getElementById('paginationControls');

            loadingState.style.display = 'block';
            noDataState.style.display = 'none';
            tableBody.innerHTML = '';
            pgControls.innerHTML = '';

            try {
                const response = await fetch(url);
                const data = await response.json();

                loadingState.style.display = 'none';

                if (data.items.length === 0) {
                    noDataState.style.display = 'block';
                    return;
                }

                data.items.forEach(item => {
                    const row = document.createElement('tr');
                    if (currentView === 'raw') {
                        const time = new Date(item.attendance_time).toLocaleString('en-US');
                        row.innerHTML = `
                            <td style="font-weight: 600; color: #fff;">${item.employee_id}</td>
                            <td>${time}</td>
                            <td><span class="badge-ip">${item.machine_ip}</span></td>
                        `;
                    } else {
                        const dateStr = new Date(item.attendance_date).toLocaleDateString('en-US');
                        const firstTime = new Date(item.first_tap).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                        const lastTime = new Date(item.last_tap).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                        const shiftBadge = item.shift === 'D' ? '<span class="badge-shift night">Night</span>' : `<span class="badge-shift">${item.shift === 'N' ? 'Day' : item.shift}</span>`;
                        const statusBadge = item.status === 'TV' ? '<span class="badge-status tv">Resigned</span>' : '<span class="badge-status active" style="color: #4ade80;">Active</span>';
                        
                        const actionBtn = `
                            <div class="btn-delete" title="Delete from all machines" onclick="deleteFromMachine('${item.employee_id}')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </div>
                        `;

                        row.innerHTML = `
                            <td style="font-weight: 600; color: #fff;">${item.employee_id}</td>
                            <td>${dateStr}</td>
                            <td>${shiftBadge}</td>
                            <td>${firstTime}</td>
                            <td>${lastTime}</td>
                            <td>
                                <span class="badge-hours">${item.work_hours}h</span>
                            </td>
                            <td>${statusBadge}</td>
                            <td>${actionBtn}</td>
                        `;
                        if (item.note) {
                            const noteRow = document.createElement('tr');
                            noteRow.className = 'note-row';
                            noteRow.innerHTML = `<td colspan="8" class="note-missing">${item.note}</td>`;
                            tableBody.appendChild(row);
                            tableBody.appendChild(noteRow);
                            return;
                        }
                    }
                    tableBody.appendChild(row);
                });

                renderPagination(data.current_page, data.total_pages, data.total_count);
            } catch (err) {
                console.error('Failed to load logs:', err);
                loadingState.textContent = 'Error loading data from server.';
            }
        }

        function renderPagination(current, total, totalRecords) {
            const container = document.getElementById('paginationControls');
            if (total <= 1) return;

            const createBtn = (p, text, active = false, disabled = false) => {
                const b = document.createElement('button');
                b.className = `btn-page ${active ? 'active' : ''}`;
                b.textContent = text || p;
                b.disabled = disabled;
                b.onclick = () => loadData(p);
                return b;
            };

            const createEllipsis = () => {
                const b = document.createElement('button');
                b.className = 'btn-page';
                b.textContent = '...';
                b.onclick = () => {
                    const p = prompt(`Enter page number (1 - ${total}):`, current);
                    if (p && !isNaN(p)) {
                        const target = parseInt(p);
                        if (target >= 1 && target <= total) loadData(target);
                    }
                };
                return b;
            };

            // Previous
            container.appendChild(createBtn(current - 1, 'Prev', false, current === 1));

            // Dynamic Pagination Logic
            const pages = [];

            if (total <= 7) {
                for (let i = 1; i <= total; i++) pages.push(i);
            } else {
                pages.push(1);

                if (current > 4) {
                    pages.push('...');
                }

                let start = Math.max(2, current - 1);
                let end = Math.min(total - 1, current + 1);

                if (current <= 4) end = 5;
                if (current >= total - 3) start = total - 4;

                for (let i = start; i <= end; i++) {
                    if (!pages.includes(i)) pages.push(i);
                }

                if (current < total - 3) {
                    pages.push('...');
                }

                if (!pages.includes(total)) pages.push(total);
            }

            pages.forEach(p => {
                if (p === '...') {
                    container.appendChild(createEllipsis());
                } else {
                    container.appendChild(createBtn(p, p, p === current));
                }
            });

            // Next
            container.appendChild(createBtn(current + 1, 'Next', false, current === total));

            const info = document.createElement('span');
            info.className = 'page-info';
            info.style.marginLeft = '20px';
            info.textContent = `(${totalRecords} records)`;
            container.appendChild(info);
        }

        async function syncData() {
            const btn = document.getElementById('syncBtn');
            if (isSyncing) return;

            try {
                const response = await fetch('/api/sync', { method: 'POST' });
                const result = await response.json();
                checkSyncStatus();
            } catch (err) {
                alert('Sync trigger failed: ' + err.message);
            }
        }

        async function checkSyncStatus() {
            try {
                const response = await fetch('/api/sync-status');
                const status = await response.json();

                const statusDiv = document.getElementById('syncStatus');
                const statusText = document.getElementById('syncStatusText');
                const syncBtn = document.getElementById('syncBtn');

                if (status.is_running) {
                    isSyncing = true;
                    statusDiv.style.display = 'block';
                    syncBtn.classList.add('loading');
                    statusText.textContent = `Syncing machine ${status.current_machine_index}/${status.total_machines}: ${status.current_machine_ip}... (Added ${status.total_added} records)`;
                    setTimeout(checkSyncStatus, 2000); // Poll every 2s
                } else {
                    if (isSyncing) {
                        // Just finished
                        alert(`Sync completed! Total added: ${status.total_added} records.`);
                        loadData(1);
                    }
                    isSyncing = false;
                    statusDiv.style.display = 'none';
                    syncBtn.classList.remove('loading');
                }
            } catch (err) {
                console.error('Status check failed:', err);
            }
        }

        // Initialize
        fetchMachines();
        loadData(1);
        async function syncExcel() {
            const btn = document.getElementById('excelSyncBtn');
            const originalText = btn.innerText;
            btn.innerText = "Syncing...";
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/employees/sync', { method: 'POST' });
                const result = await response.json();
                alert(result.message);
                loadData(1);
            } catch (err) {
                console.error('Excel Sync failed:', err);
                alert('Excel Sync failed: ' + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function deleteFromMachine(employeeId) {
            if (!confirm(`Are you sure you want to delete Employee ${employeeId} from ALL ZKTeco machines?\n\nThis will permanently remove their biometric data (fingerprints/face). Historical logs in this dashboard will NOT be deleted.`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/employees/${employeeId}/machine-data`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.is_running) {
                    checkDeleteStatus();
                } else {
                    alert(data.message || 'Operation failed.');
                }
            } catch (err) {
                console.error('Delete initiation failed:', err);
                alert('Delete operation failed to start.');
            }
        }

        let isDeleting = false;
        async function checkDeleteStatus() {
            if (isDeleting) return;
            isDeleting = true;
            
            const statusDiv = document.getElementById('deleteStatus');
            const statusText = document.getElementById('deleteStatusText');
            statusDiv.style.display = 'block';

            try {
                while (true) {
                    const response = await fetch('/api/employees/delete-status');
                    const data = await response.json();
                    
                    if (data.is_running) {
                        statusText.innerText = `Deleting ID ${data.employee_id}: Machine ${data.processed_count}/${data.total_machines} (${data.current_ip})`;
                    } else {
                        statusText.innerText = `Deletion Finished for ID ${data.employee_id}.`;
                        
                        let summary = `Deletion Results for ID ${data.employee_id}:\n`;
                        for (const [ip, result] of Object.entries(data.results)) {
                            summary += `- ${ip}: ${result}\n`;
                        }
                        alert(summary);
                        
                        setTimeout(() => {
                            statusDiv.style.display = 'none';
                        }, 3000);
                        break;
                    }
                    await new Promise(r => setTimeout(r, 1000));
                }
            } catch (err) {
                console.error('Delete status monitor failed:', err);
            } finally {
                isDeleting = false;
            }
        }

        checkSyncStatus(); // Poll status on load in case sync is already running
        async function openDeviceModal() {
            document.getElementById('deviceModal').style.display = 'block';
            await fetchDeviceCapacity();
        }

        function closeDeviceModal() {
            document.getElementById('deviceModal').style.display = 'none';
        }

        async function fetchDeviceCapacity() {
            const body = document.getElementById('deviceModalBody');
            body.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="display:inline-block;"></div><p style="margin-top:20px;">Connecting to machines...</p></div>';
            
            try {
                const response = await fetch('/api/devices/capacity');
                const devices = await response.json();
                
                let html = `
                    <table class="capacity-table">
                        <thead>
                            <tr>
                                <th>Machine IP</th>
                                <th>Status</th>
                                <th>Users</th>
                                <th>Fingerprints</th>
                                <th>Logs</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                devices.forEach(d => {
                    const statusClass = d.status === 'Online' ? 'active' : 'tv';
                    const statusText = d.status === 'Online' ? 'Online' : 'Offline';
                    
                    if (d.status === 'Online') {
                        const userPct = Math.min((d.users / d.users_cap) * 100, 100);
                        const fingerPct = Math.min((d.fingers / d.fingers_cap) * 100, 100);
                        const recordPct = Math.min((d.records / d.records_cap) * 100, 100);

                        html += `
                            <tr>
                                <td>${d.ip}</td>
                                <td><span class="badge-status" style="color: ${d.status === 'Online' ? '#4ade80' : '#f87171'}">${statusText}</span></td>
                                <td>
                                    <div>${d.users} / ${d.users_cap}</div>
                                    <div class="capacity-bar"><div class="capacity-fill" style="width: ${userPct}%; background: #6366f1;"></div></div>
                                </td>
                                <td>
                                    <div>${d.fingers} / ${d.fingers_cap}</div>
                                    <div class="capacity-bar"><div class="capacity-fill" style="width: ${fingerPct}%; background: #2dd4bf;"></div></div>
                                </td>
                                <td>
                                    <div>${d.records} / ${d.records_cap}</div>
                                    <div class="capacity-bar"><div class="capacity-fill" style="width: ${recordPct}%; background: #8b5cf6;"></div></div>
                                </td>
                            </tr>
                        `;
                    } else {
                        html += `
                            <tr>
                                <td>${d.ip}</td>
                                <td><span class="badge-status" style="color: #f87171">Offline</span></td>
                                <td colspan="3" style="color: var(--text-muted);">${d.error || 'Connection Failed'}</td>
                            </tr>
                        `;
                    }
                });
                
                html += `</tbody></table>`;
                body.innerHTML = html;
            } catch (err) {
                body.innerHTML = `<p style="color: #f87171;">Error: ${err.message}</p>`;
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('deviceModal');
            if (event.target == modal) {
                closeDeviceModal();
            }
        }
    </script>
</body>
